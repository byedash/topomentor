schema_version = "1.0.0"

# --- Định danh extension (Blender 4.2+) ---
id = "topomentor"
version = "2.0.0"
name = "TopoMentor"
tagline = "Analyze topology, score mesh health, learn by fixing"
maintainer = "byedash <byedash@users.noreply.github.com>"
type = "add-on"

website = "https://github.com/byedash/topomentor"
tags = ["Mesh", "Modeling"]

blender_version_min = "4.2.0"

# SPDX license — GPL bắt buộc cho add-on dùng bpy.
license = ["SPDX:GPL-3.0-or-later"]

# Khai báo quyền: chỉ ghi file khi user bấm Export Report (chọn đường dẫn qua file browser).
[permissions]
files = "Xuất báo cáo topology ra file .txt do người dùng chọn"

# Add-on này chỉ dùng API nhúng của Blender, không cần wheel/thư viện ngoài.
